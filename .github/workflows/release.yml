name: Release binaries

# タグ(例: v0.1.0)をpushすると、Linux(x86_64-unknown-linux-gnu)・
# Windows(x86_64)向けにビルドし、GitHub Releasesへ添付する。
#
# **正直な開示**: gnuターゲットのバイナリは、Ubuntu 20.04以降・
# Debian 11以降・AlmaLinux 8以降・Fedora等、比較的新しいglibcを持つ
# ディストリではそのまま動くが、非常に古いディストリでは動かない
# 可能性がある(muslによる完全なディストリ非依存の静的リンクは
# 対象外、open-web-serverと同じトレードオフ判断)。

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (glibc, Ubuntu/Debian/AlmaLinux/Fedora等の比較的新しいディストリ向け)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release --bin rs-linkfusion
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/rs-linkfusion dist/rs-linkfusion
          cp install.sh dist/install.sh
          tar -czf rs-linkfusion-linux-x86_64.tar.gz -C dist rs-linkfusion install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: rs-linkfusion-linux-x86_64
          path: rs-linkfusion-linux-x86_64.tar.gz

  build-windows:
    name: Windows (x86_64、Windows Server含む)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release --bin rs-linkfusion
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/rs-linkfusion.exe dist/
          Copy-Item install.ps1 dist/
          Compress-Archive -Path dist/* -DestinationPath rs-linkfusion-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: rs-linkfusion-windows-x86_64
          path: rs-linkfusion-windows-x86_64.zip

  release:
    name: GitHub Releaseへ添付
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            rs-linkfusion-linux-x86_64/rs-linkfusion-linux-x86_64.tar.gz
            rs-linkfusion-windows-x86_64/rs-linkfusion-windows-x86_64.zip
